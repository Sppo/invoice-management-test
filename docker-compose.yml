services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: invoices_db
      DB_USERNAME: invoices_user
      DB_PASSWORD: invoices_password
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NUXT_API_BASE: http://backend:8000/api
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api
    command: npm run dev -- --host 0.0.0.0

  db:
    image: postgres:16-alpine
    container_name: invoice_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: invoices_db
      POSTGRES_USER: invoices_user
      POSTGRES_PASSWORD: invoices_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: